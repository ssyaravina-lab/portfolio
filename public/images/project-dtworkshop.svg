<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0000FF"/>
  <!-- Workshop grid -->
  <rect x="40" y="40" width="230" height="200" fill="#FFF" stroke="#000" stroke-width="4"/>
  <rect x="285" y="40" width="230" height="200" fill="#FFF" stroke="#000" stroke-width="4"/>
  <rect x="530" y="40" width="230" height="200" fill="#FF0000" stroke="#000" stroke-width="4"/>
  <!-- Sticky notes pattern -->
  <rect x="60" y="60" width="80" height="80" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <rect x="160" y="60" width="80" height="80" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <rect x="60" y="150" width="80" height="70" fill="#FFFF00" stroke="#000" stroke-width="3"/>
  <rect x="305" y="60" width="80" height="80" fill="#FF0000" stroke="#000" stroke-width="3"/>
  <rect x="405" y="60" width="80" height="80" fill="#FF0000" stroke="#000" stroke-width="3"/>
  <rect x="305" y="150" width="190" height="70" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- People icons -->
  <circle cx="140" cy="340" r="40" fill="#FFF" stroke="#000" stroke-width="4"/>
  <circle cx="300" cy="340" r="40" fill="#FFF" stroke="#000" stroke-width="4"/>
  <circle cx="460" cy="340" r="40" fill="#FFF" stroke="#000" stroke-width="4"/>
  <circle cx="620" cy="340" r="40" fill="#FFFF00" stroke="#000" stroke-width="4"/>
  <!-- Connection lines -->
  <line x1="180" y1="340" x2="260" y2="340" stroke="#FFF" stroke-width="4"/>
  <line x1="340" y1="340" x2="420" y2="340" stroke="#FFF" stroke-width="4"/>
  <line x1="500" y1="340" x2="580" y2="340" stroke="#FFF" stroke-width="4"/>
  <!-- Bottom label -->
  <rect x="40" y="420" width="720" height="60" fill="#000" stroke="#FFF" stroke-width="4"/>
  <text x="60" y="462" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#FFF">MINDSET SHIFT → TOOL ACTIVATION</text>
  <!-- Number -->
  <text x="555" y="170" font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="#FFF">02</text>
