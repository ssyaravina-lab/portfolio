<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#000"/>
  <!-- Business blocks -->
  <rect x="40" y="40" width="180" height="200" fill="#FF0000" stroke="#FFF" stroke-width="4"/>
  <rect x="235" y="40" width="180" height="200" fill="#FFFF00" stroke="#000" stroke-width="4"/>
  <rect x="430" y="40" width="180" height="200" fill="#0000FF" stroke="#FFF" stroke-width="4"/>
  <rect x="625" y="40" width="135" height="200" fill="#FFF" stroke="#000" stroke-width="4"/>
  <!-- Labels -->
  <text x="60" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#FFF">F&amp;B</text>
  <text x="255" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#000">FASHION</text>
  <text x="450" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#FFF">CREATIVE</text>
  <text x="640" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#000">SME</text>
  <!-- Bar chart pattern -->
  <rect x="70" y="160" width="40" height="60" fill="#FFF"/>
  <rect x="130" y="130" width="40" height="90" fill="#FFF"/>
  <rect x="265" y="150" width="40" height="70" fill="#000"/>
  <rect x="325" y="110" width="40" height="110" fill="#000"/>
  <rect x="460" y="140" width="40" height="80" fill="#FFF"/>
  <rect x="520" y="100" width="40" height="120" fill="#FFF"/>
  <!-- Process flow -->
  <rect x="40" y="280" width="720" height="80" fill="#FF0000" stroke="#FFF" stroke-width="4"/>
  <text x="60" y="330" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#FFF">IDEA → DECISION → OPERATION → VIABILITY</text>
  <!-- Bottom grid -->
  <rect x="40" y="390" width="230" height="80" fill="#FFF" stroke="#000" stroke-width="4"/>
  <rect x="285" y="390" width="230" height="80" fill="#FFFF00" stroke="#000" stroke-width="4"/>
  <rect x="530" y="390" width="230" height="80" fill="#FFF" stroke="#000" stroke-width="4"/>
  <text x="80" y="440" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#000">HIRE vs PARTNER</text>
  <text x="310" y="440" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#000">CASE-BASED</text>
  <text x="560" y="440" font-family="system-ui, sans-serif" font-size="16" font-weight="900" fill="#000">FEASIBILITY</text>
  <!-- Number -->
  <text x="660" y="490" font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="#FF0000">04</text>
</svg>
